<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOLT — Admin Login</title>
  <link rel="icon" href="images/favicon.png" sizes="48x48">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111111">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 48px 36px;
      border-radius: 16px;
      width: 380px;
      max-width: 90vw;
      text-align: center;
    }
    .login-box h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }
    .login-box h1 span {
      font-weight: 400;
      color: #888;
      font-size: 18px;
      letter-spacing: 1px;
    }
    .login-box p.sub {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      font-size: 15px;
    }
    .form-group input:focus {
      outline: none;
      border-color: #1a1a1a;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #1a1a1a;
      color: #fff;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover { background: #e63946; }
    .error {
      color: #e63946;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }
    .back-link:hover { color: #1a1a1a; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>VOLT <span>Admin</span></h1>
    <p class="sub">Sign in to manage your store</p>
    <form id="login-form">
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter admin password" required autofocus>
      </div>
      <button type="submit" class="btn">Login</button>
      <p class="error" id="login-error">Incorrect password</p>
    </form>
    <a href="/" class="back-link">&larr; Back to Store</a>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const pass = document.getElementById('login-pass').value;
      if (pass === 'admin123') {
        sessionStorage.setItem('volt_admin', 'true');
        window.location.href = 'admin.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
